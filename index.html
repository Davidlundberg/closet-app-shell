<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>David's Closet</title>
<!-- PWA (Drop 4): installable app shell + iOS standalone polish -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="static/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="static/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Closet">
<!-- Both metas track the app's manual theme toggle via JS (see applyThemeColor);
     the media split covers first paint before that script runs. -->
<meta name="theme-color" content="#fafaf8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#18181b" media="(prefers-color-scheme: dark)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
<style>
:root {
  --color-primary: #0d9488;
  --color-primary-hover: #0f766e;
  --color-primary-muted: rgba(13,148,136,0.12);
  --color-secondary: #3f3f46;
  --color-secondary-hover: #27272a;
  --color-secondary-light: #71717a;
  --color-secondary-muted: rgba(63,63,70,0.12);
  --color-bg: #fafaf8;
  --color-bg-subtle: #f4f3ef;
  --color-card: #ffffff;
  --color-text: #18181b;
  --color-text-secondary: #52525b;
  --color-text-muted: #a1a1aa;
  --color-border: #e5e3de;
  --color-border-hover: #d1cec7;
  --color-success: #059669;
  --color-danger: #dc2626;
  --shadow-card: 0 2px 8px rgba(10,22,40,0.08), 0 1px 2px rgba(10,22,40,0.04);
  --shadow-hover: 0 12px 40px rgba(10,22,40,0.12), 0 2px 6px rgba(10,22,40,0.06);
  --shadow-modal: 0 24px 48px rgba(10,22,40,0.18), 0 4px 12px rgba(10,22,40,0.08);
  --shadow-dropdown: 0 8px 24px rgba(10,22,40,0.12), 0 2px 6px rgba(10,22,40,0.04);
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-pill: 9999px;
  --font-serif: 'DM Serif Display', Georgia, serif;
}
[data-theme="dark"] {
  --color-primary: #14b8a6;
  --color-primary-hover: #2dd4bf;
  --color-primary-muted: rgba(20,184,166,0.15);
  --color-secondary: #a1a1aa;
  --color-secondary-hover: #d4d4d8;
  --color-secondary-light: #71717a;
  --color-secondary-muted: rgba(161,161,170,0.12);
  --color-bg: #18181b;
  --color-bg-subtle: #1f1f23;
  --color-card: #27272a;
  --color-text: #fafafa;
  --color-text-secondary: #a1a1aa;
  --color-text-muted: #71717a;
  --color-border: #3f3f46;
  --color-border-hover: #52525b;
  --color-success: #34d399;
  --color-danger: #f87171;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-hover: 0 12px 40px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
  --shadow-modal: 0 24px 48px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);
  --shadow-dropdown: 0 8px 24px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-feature-settings: "cv01"; background: var(--color-bg); color: var(--color-text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
/* Safe-area insets keep the standalone PWA clear of the notch/home indicator;
   env() resolves to 0px in normal browsers, so desktop layout is unchanged. */
.app { max-width: 720px; margin: 0 auto; padding: calc(2rem + env(safe-area-inset-top, 0px)) calc(1.5rem + env(safe-area-inset-right, 0px)) calc(2rem + env(safe-area-inset-bottom, 0px)) calc(1.5rem + env(safe-area-inset-left, 0px)); }
.app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.app-header-actions { display: flex; gap: 6px; }
h1 { font-family: var(--font-serif); font-size: 22px; font-weight: 400; letter-spacing: -0.02em; color: var(--color-secondary); }
.icon-btn { background: none; border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 5px 8px; cursor: pointer; font-size: 14px; line-height: 1; transition: all 120ms var(--ease); color: var(--color-text-muted); font-family: inherit; }
.icon-btn:hover { border-color: var(--color-border-hover); color: var(--color-text-secondary); background: var(--color-bg-subtle); }
.tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--color-border); }
.tab { padding: 9px 18px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--color-text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 120ms var(--ease); letter-spacing: 0.02em; font-family: inherit; }
.tab.active { color: var(--color-primary); border-bottom: 2px solid var(--color-primary); font-weight: 500; }
.tab:hover:not(.active) { color: var(--color-text-secondary); }
.panel { display: none; }
.panel.active { display: block; }

@keyframes focus-glow { from { box-shadow: 0 0 0 0 rgba(13,148,136,0); } to { box-shadow: 0 0 0 4px var(--color-primary-muted); } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Inputs */
.search-box { width: 100%; padding: 9px 12px; font-size: 14px; border-radius: var(--radius-sm); border: 1px solid var(--color-border); background: var(--color-card); color: var(--color-text); font-family: inherit; font-feature-settings: "cv01"; margin-bottom: 1rem; outline: none; transition: border-color 120ms var(--ease); }
.search-box:focus { border-color: var(--color-primary); animation: focus-glow 200ms var(--ease) forwards; }

/* Closet */
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 1rem; }
.cat-card { background: var(--color-bg-subtle); border-radius: var(--radius-sm); padding: 11px 13px; cursor: pointer; border: 1px solid var(--color-border); transition: all 200ms var(--ease); }
.cat-card:hover { border-color: var(--color-border-hover); background: var(--color-card); transform: translateY(-1px); box-shadow: var(--shadow-card); }
.cat-card.selected { border-color: var(--color-primary); background: var(--color-card); box-shadow: 0 0 0 1px var(--color-primary); }
.cat-name { font-family: var(--font-serif); font-size: 14px; font-weight: 400; color: var(--color-secondary); }
.cat-count { font-size: 11px; color: var(--color-text-muted); margin-top: 2px; }
.section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--color-secondary-light); margin: 1.25rem 0 0.6rem; }

/* Item rows — text-first, no thumbs, no color dots */
.item-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--color-border); gap: 10px; }
.item-row:last-child { border-bottom: none; }
.item-name { font-size: 13px; color: var(--color-text); flex: 1; }
.item-actions { display: flex; gap: 6px; align-items: center; }
.season-badge { font-size: 11px; padding: 2px 8px; border-radius: var(--radius-pill); background: var(--color-bg-subtle); color: var(--color-text-muted); border: 1px solid var(--color-border); white-space: nowrap; }
.action-btn { font-size: 11px; color: var(--color-text-muted); background: none; border: none; cursor: pointer; padding: 2px 4px; font-family: inherit; transition: color 120ms var(--ease); }
.action-btn:hover { color: var(--color-text-secondary); }
.action-btn.del:hover { color: var(--color-danger); }

/* Add item bar */
.add-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
.add-btn { padding: 8px 14px; font-size: 13px; background: var(--color-primary); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; white-space: nowrap; transition: all 200ms var(--ease); }
.add-btn:hover { background: var(--color-primary-hover); box-shadow: 0 0 0 3px var(--color-primary-muted); }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal { background: var(--color-card); border-radius: var(--radius-lg); padding: 1.5rem; width: 460px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-modal); }
.modal h2 { font-family: var(--font-serif); font-size: 17px; font-weight: 400; margin-bottom: 1.25rem; color: var(--color-secondary); }
.form-row { margin-bottom: 0.85rem; }
.form-row label { font-size: 11px; color: var(--color-text-muted); letter-spacing: 0.05em; text-transform: uppercase; display: block; margin-bottom: 5px; }
.form-row input, .form-row select, .form-row textarea { width: 100%; padding: 8px 10px; font-size: 13px; border-radius: var(--radius-sm); border: 1px solid var(--color-border); background: var(--color-card); color: var(--color-text); font-family: inherit; font-feature-settings: "cv01"; outline: none; transition: border-color 120ms var(--ease); }
.form-row textarea { resize: vertical; line-height: 1.5; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--color-primary); animation: focus-glow 200ms var(--ease) forwards; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; }
.btn-cancel { padding: 8px 14px; font-size: 13px; background: var(--color-bg-subtle); color: var(--color-text-secondary); border: 1px solid var(--color-border); border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; transition: all 120ms var(--ease); }
.btn-cancel:hover { background: var(--color-border); }
.btn-save { padding: 8px 14px; font-size: 13px; background: var(--color-primary); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; transition: all 200ms var(--ease); }
.btn-save:hover { background: var(--color-primary-hover); box-shadow: 0 0 0 3px var(--color-primary-muted); }

select { width: 100%; padding: 8px 10px; font-size: 13px; border-radius: var(--radius-sm); border: 1px solid var(--color-border); background: var(--color-card); color: var(--color-text); font-family: inherit; font-feature-settings: "cv01"; outline: none; transition: border-color 120ms var(--ease); }
select:focus { border-color: var(--color-primary); }

/* Button option groups */
.btn-group { display: flex; flex-wrap: wrap; gap: 5px; }
.btn-opt { padding: 5px 12px; font-size: 12px; border-radius: var(--radius-pill); border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text-muted); cursor: pointer; font-family: inherit; font-feature-settings: "cv01"; transition: all 120ms var(--ease); white-space: nowrap; letter-spacing: 0.01em; }
.btn-opt:hover { border-color: var(--color-border-hover); color: var(--color-text-secondary); background: var(--color-bg-subtle); }
.btn-opt.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }

/* Status bar */
.status-bar { font-size: 11px; color: var(--color-text-muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-success); }
.status-dot.error { background: var(--color-danger); }

/* Ask tab */
.ask-form { margin-bottom: 1.25rem; }
.ask-input { width: 100%; padding: 10px 12px; font-size: 14px; border-radius: var(--radius-sm); border: 1px solid var(--color-border); background: var(--color-card); color: var(--color-text); font-family: inherit; font-feature-settings: "cv01"; outline: none; resize: none; line-height: 1.5; box-sizing: border-box; transition: border-color 120ms var(--ease); }
.ask-input:focus { border-color: var(--color-primary); animation: focus-glow 200ms var(--ease) forwards; }
.gen-btn { width: 100%; padding: 10px; background: var(--color-primary); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 200ms var(--ease); margin-top: 8px; letter-spacing: 0.02em; }
.gen-btn:hover { background: var(--color-primary-hover); box-shadow: 0 0 0 3px var(--color-primary-muted); }
.gen-btn:disabled { opacity: 0.6; cursor: wait; }
.ask-state { font-size: 13px; color: var(--color-text-muted); padding: 1.5rem 0; text-align: center; }
@keyframes askDots { 0%,20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%,100% { content: '...'; } }
.ask-thinking::after { content: ''; animation: askDots 1.2s steps(1) infinite; }

/* Ask card — slot-structured */
.ask-card { background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 1.25rem; margin-bottom: 10px; box-shadow: var(--shadow-card); animation: fadeInUp 200ms var(--ease) both; }
.ask-card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; gap: 12px; }
.ask-card-title { font-family: var(--font-serif); font-size: 17px; font-weight: 400; color: var(--color-secondary); }
.ask-card-vibe { font-size: 11px; color: var(--color-text-muted); letter-spacing: 0.05em; text-transform: uppercase; text-align: right; }
.ask-rationale { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 14px; padding: 10px 12px; background: var(--color-bg-subtle); border-radius: var(--radius-sm); border-left: 2px solid var(--color-secondary); }
.slot-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px; }
.slot-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--color-border); }
.slot-row:last-child { border-bottom: none; }
.slot-label { font-size: 10px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--color-text-muted); width: 72px; flex-shrink: 0; }
.slot-body { flex: 1; min-width: 0; }
.slot-item { font-size: 13px; color: var(--color-text); font-weight: 500; }
.slot-reason { font-size: 11px; color: var(--color-text-muted); margin-top: 2px; font-style: italic; }
.slot-empty { font-size: 13px; color: var(--color-text-muted); font-style: italic; }
.slot-swap { font-size: 11px; padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text-muted); cursor: pointer; font-family: inherit; transition: all 120ms var(--ease); white-space: nowrap; }
.slot-swap:hover { border-color: var(--color-secondary-light); color: var(--color-secondary); background: var(--color-secondary-muted); }
.slot-swap:disabled { opacity: 0.5; cursor: wait; }
.slot-swap.swapping::after { content: '…'; }

/* Manual slot picker (build-your-own) */
.picker-panel { border: 1px solid var(--color-border-hover); border-radius: var(--radius-md); margin: 0 0 8px; background: var(--color-card); overflow: hidden; animation: fadeInUp 140ms var(--ease) both; }
.picker-claude { display: flex; align-items: center; gap: 7px; padding: 9px 12px; font-size: 13px; font-weight: 500; color: var(--color-primary); cursor: pointer; }
.picker-claude:hover { background: var(--color-secondary-muted); }
.picker-claude.picker-thinking { opacity: 0.5; pointer-events: none; }
.picker-wand { font-size: 12px; }
.picker-list { max-height: 240px; overflow-y: auto; border-top: 1px solid var(--color-border); }
.picker-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 12px; font-size: 13px; color: var(--color-text); cursor: pointer; }
.picker-item:hover { background: var(--color-bg-subtle); }
.picker-item.selected { background: var(--color-secondary-muted); font-weight: 500; }
.picker-check { color: var(--color-primary); flex-shrink: 0; }
.picker-empty { padding: 10px 12px; font-size: 12px; color: var(--color-text-muted); font-style: italic; }
.picker-toggle { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border-top: 1px solid var(--color-border); font-size: 12px; color: var(--color-text-secondary); cursor: pointer; user-select: none; }
.picker-switch { width: 32px; height: 17px; border-radius: 999px; background: var(--color-border); position: relative; flex-shrink: 0; transition: background 120ms; }
.picker-switch.on { background: var(--color-primary); }
.picker-knob { position: absolute; top: 1px; left: 1px; width: 15px; height: 15px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.2); transition: left 120ms; }
.picker-switch.on .picker-knob { left: 16px; }

/* Card actions */
.card-actions { display: flex; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--color-border); }
.card-action { font-size: 12px; padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text-muted); cursor: pointer; font-family: inherit; transition: all 120ms var(--ease); white-space: nowrap; }
.card-action:hover { border-color: var(--color-secondary-light); color: var(--color-secondary); background: var(--color-secondary-muted); }
.card-action.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
.card-action:disabled { opacity: 0.6; cursor: not-allowed; }

/* Chat thread */
.chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
.chat-header-title { font-size: 10px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--color-secondary-light); }
.chat-reset { font-size: 11px; padding: 4px 10px; border-radius: var(--radius-sm); border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text-muted); cursor: pointer; font-family: inherit; transition: all 120ms var(--ease); }
.chat-reset:hover { border-color: var(--color-secondary-light); color: var(--color-secondary); background: var(--color-secondary-muted); }
.chat-thread { display: flex; flex-direction: column; gap: 14px; margin-bottom: 1rem; }
.chat-thread:empty { margin-bottom: 0; }
.chat-turn { display: flex; flex-direction: column; gap: 10px; animation: fadeInUp 200ms var(--ease) both; }
.chat-msg-user { align-self: flex-end; max-width: 85%; padding: 8px 12px; background: var(--color-primary); color: #fff; border-radius: var(--radius-md); font-size: 13px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
.chat-msg-assistant { align-self: flex-start; max-width: 95%; font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; padding: 0 2px; font-style: italic; }
.card-group { display: flex; flex-direction: column; gap: 8px; }
.card-group .ask-card { margin-bottom: 0; }
.card-group .ask-card-index { font-size: 10px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--color-secondary-light); margin-bottom: 6px; }

/* Today tab */
.today-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 1rem; animation: fadeInUp 200ms var(--ease) both; }
.today-date { font-family: var(--font-serif); font-size: 28px; font-weight: 400; letter-spacing: -0.02em; color: var(--color-text); min-width: 0; }
.day-toggle { display: flex; gap: 2px; padding: 3px; background: var(--color-bg-subtle); border: 1px solid var(--color-border); border-radius: var(--radius-pill); flex-shrink: 0; }
.day-opt { font-size: 12px; padding: 4px 13px; border-radius: var(--radius-pill); border: none; background: none; color: var(--color-text-muted); cursor: pointer; font-family: inherit; letter-spacing: 0.01em; transition: all 120ms var(--ease); white-space: nowrap; }
.day-opt:hover:not(.active) { color: var(--color-text-secondary); }
.day-opt.active { background: var(--color-card); color: var(--color-text); font-weight: 500; box-shadow: var(--shadow-card); }
.weather-temp-lo { font-size: 16px; font-weight: 500; color: var(--color-text-muted); }
.weather-strip { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-md); margin-bottom: 1.25rem; box-shadow: var(--shadow-card); animation: fadeInUp 200ms var(--ease) both; min-height: 68px; }
.weather-icon { color: var(--color-primary); display: flex; align-items: center; flex-shrink: 0; }
.weather-icon svg { width: 30px; height: 30px; }
.weather-temp { font-size: 25px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; color: var(--color-text); }
.weather-feels { font-size: 11px; color: var(--color-text-muted); margin-top: 2px; }
.weather-meta { margin-left: auto; text-align: right; }
.weather-summary { font-size: 13px; color: var(--color-text-secondary); text-transform: capitalize; }
.weather-hilo { font-size: 11px; color: var(--color-text-muted); margin-top: 3px; }
.weather-unavailable { font-size: 13px; color: var(--color-text-muted); font-style: italic; }
.chip-row { display: flex; gap: 6px; margin-bottom: 1.25rem; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.chip-row::-webkit-scrollbar { display: none; }
.chip-row .btn-opt { flex-shrink: 0; }

/* Hero outfit card — Today's signature surface */
.hero-card { background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-card); animation: fadeInUp 200ms var(--ease) both; }
.hero-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--color-secondary-light); margin-bottom: 10px; }
.hero-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 4px; }
.hero-title { font-family: var(--font-serif); font-size: 23px; font-weight: 400; letter-spacing: -0.01em; color: var(--color-secondary); }
.hero-vibe { font-size: 11px; color: var(--color-text-muted); letter-spacing: 0.05em; text-transform: uppercase; text-align: right; }
.hero-reason { font-size: 13px; font-style: italic; color: var(--color-text-secondary); line-height: 1.6; margin: 12px 0 14px; padding: 10px 14px; background: var(--color-bg-subtle); border-left: 2px solid var(--color-primary); border-radius: var(--radius-sm); }
.hero-card .slot-row { padding: 11px 0; }
.hero-card .slot-item { font-size: 14px; }
.hero-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--color-border); }
.card-action.primary { background: var(--color-primary); color: #fff; border-color: var(--color-primary); font-weight: 500; padding: 7px 16px; }
.card-action.primary:hover:not(:disabled) { background: var(--color-primary-hover); border-color: var(--color-primary-hover); color: #fff; box-shadow: 0 0 0 3px var(--color-primary-muted); }
.today-error { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 12px; }

/* Hero skeleton */
@keyframes skeletonPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
.skeleton-line { height: 12px; border-radius: var(--radius-sm); background: var(--color-bg-subtle); animation: skeletonPulse 1.4s var(--ease) infinite; }
.today-composing { font-size: 13px; color: var(--color-text-muted); text-align: center; padding: 4px 0 16px; }

/* Insights tab */
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.75rem; animation: fadeInUp 200ms var(--ease) both; }
.stat { background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 16px 14px 14px; box-shadow: var(--shadow-card); min-width: 0; }
.stat-num { font-family: var(--font-serif); font-size: 34px; font-weight: 400; letter-spacing: -0.02em; line-height: 1; color: var(--color-text); }
.stat-label { font-size: 10px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--color-text-muted); margin-top: 7px; line-height: 1.45; }
.insights-section { margin-bottom: 1.75rem; animation: fadeInUp 200ms var(--ease) both; }
.insights-section .section-label { margin-top: 0; }
.mw-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--color-border); }
.mw-row:last-child { border-bottom: none; }
.mw-rank { font-family: var(--font-serif); font-size: 15px; color: var(--color-text-muted); width: 16px; flex-shrink: 0; text-align: center; }
.mw-body { flex: 1; min-width: 0; }
.mw-name { font-size: 13px; font-weight: 500; color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mw-meta { font-size: 11px; color: var(--color-text-muted); margin-top: 2px; }
.mw-bar { height: 3px; border-radius: 2px; background: var(--color-bg-subtle); margin-top: 7px; overflow: hidden; }
.mw-bar span { display: block; height: 100%; max-width: 100%; background: var(--color-primary); border-radius: 2px; }
.mw-count { font-size: 13px; font-weight: 600; color: var(--color-text-secondary); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.shadow-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--color-border); }
.shadow-row:last-child { border-bottom: none; }
.shadow-main { flex: 1; min-width: 0; }
.shadow-name { font-size: 13px; color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.shadow-meta { font-size: 11px; color: var(--color-text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.style-this { flex-shrink: 0; }
.cat-bar-row { display: flex; align-items: center; gap: 12px; padding: 7px 0; }
.cat-bar-label { width: 90px; flex-shrink: 0; font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-bar { flex: 1; height: 6px; border-radius: 3px; background: var(--color-bg-subtle); overflow: hidden; }
.cat-bar span { display: block; height: 100%; max-width: 100%; background: var(--color-primary); border-radius: 3px; opacity: 0.85; }
.cat-bar-count { width: 42px; flex-shrink: 0; text-align: right; font-size: 11px; color: var(--color-text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
.insights-empty { text-align: center; padding: 3.5rem 1.5rem; animation: fadeInUp 200ms var(--ease) both; }
.insights-empty-title { font-family: var(--font-serif); font-size: 22px; font-weight: 400; color: var(--color-secondary); letter-spacing: -0.01em; }
.insights-empty-copy { font-size: 13px; color: var(--color-text-muted); line-height: 1.65; max-width: 400px; margin: 10px auto 0; }
.insights-state { font-size: 13px; color: var(--color-text-muted); padding: 2rem 0; text-align: center; }

/* Trips — entry row, banner, modal form/plan */
.trip-banner { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding: 9px 14px; background: var(--color-primary-muted); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: 12px; color: var(--color-text-secondary); animation: fadeInUp 200ms var(--ease) both; }
.trip-banner-text { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.trip-banner-dest { font-weight: 600; color: var(--color-text); }
.trip-banner-view { font-size: 11px; padding: 4px 10px; border-radius: var(--radius-pill); border: 1px solid var(--color-border); background: var(--color-card); color: var(--color-text-secondary); cursor: pointer; font-family: inherit; white-space: nowrap; transition: all 120ms var(--ease); }
.trip-banner-view:hover { border-color: var(--color-primary); color: var(--color-primary); }
.trip-entry { display: flex; align-items: center; gap: 10px; width: 100%; margin-top: 12px; padding: 13px 16px; background: none; border: 1px solid var(--color-border); border-radius: var(--radius-md); cursor: pointer; font-family: var(--font-serif); font-size: 15px; letter-spacing: -0.01em; color: var(--color-secondary); text-align: left; transition: all 150ms var(--ease); animation: fadeInUp 200ms var(--ease) both; }
.trip-entry:hover { border-color: var(--color-border-hover); background: var(--color-bg-subtle); }
.trip-entry svg { width: 18px; height: 18px; color: var(--color-text-muted); flex-shrink: 0; }
.trip-modal { width: 560px; }
.trip-loading { font-size: 13px; color: var(--color-text-muted); text-align: center; padding: 2.5rem 0; }
.trip-form-error { font-size: 12px; color: var(--color-danger); min-height: 16px; margin-top: 2px; }
.trip-result-meta { font-size: 12px; color: var(--color-text-muted); margin: 0 0 12px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.bag-chip { font-size: 11px; padding: 1px 9px; border-radius: var(--radius-pill); background: var(--color-bg-subtle); border: 1px solid var(--color-border); color: var(--color-text-secondary); white-space: nowrap; }
.trip-seasonal-flag { font-style: italic; }
.trip-forecast { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 8px; scrollbar-width: none; }
.trip-forecast::-webkit-scrollbar { display: none; }
.trip-fc-cell { flex: 1; min-width: 58px; text-align: center; padding: 8px 4px; background: var(--color-bg-subtle); border: 1px solid var(--color-border); border-radius: var(--radius-sm); }
.trip-fc-date { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); margin-bottom: 3px; white-space: nowrap; }
.trip-fc-temp { font-size: 13px; font-weight: 600; color: var(--color-text); white-space: nowrap; }
.trip-fc-temp span { font-weight: 400; color: var(--color-text-muted); font-size: 11px; }
.trip-fc-precip { font-size: 10px; color: var(--color-primary); margin-top: 2px; min-height: 13px; }
.trip-cap-group { margin-bottom: 10px; }
.trip-cap-cat { font-size: 10px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--color-text-muted); margin-bottom: 3px; }
.trip-cap-item { font-size: 13px; color: var(--color-text); padding: 4px 0; border-bottom: 1px solid var(--color-border); }
.trip-cap-item:last-child { border-bottom: none; }
.trip-day { padding: 9px 0; border-bottom: 1px solid var(--color-border); }
.trip-day:last-child { border-bottom: none; }
.trip-day-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
.trip-day-label { font-size: 12px; font-weight: 600; color: var(--color-text); white-space: nowrap; }
.trip-day-plan { font-size: 11px; color: var(--color-text-muted); font-style: italic; text-align: right; }
.trip-day-slots { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; line-height: 1.5; }
.trip-day-acc { color: var(--color-text-muted); }
.trip-rewear { font-size: 12px; font-style: italic; color: var(--color-text-secondary); line-height: 1.55; margin-top: 12px; padding: 9px 12px; background: var(--color-bg-subtle); border-radius: var(--radius-sm); }
.trip-extras { display: flex; flex-direction: column; gap: 2px; }
.trip-extra { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text); padding: 5px 0; cursor: pointer; }
.trip-extra input { accent-color: var(--color-primary); width: 14px; height: 14px; flex-shrink: 0; }

@media (max-width: 480px) {
  .app { padding: 1.5rem 1rem; }
  .today-head { flex-wrap: wrap; gap: 8px; }
  .trip-day-head { flex-wrap: wrap; gap: 2px 10px; }
  .trip-day-plan { text-align: left; }
  .trip-fc-cell { min-width: 52px; }
  .today-date { font-size: 24px; }
  .weather-temp { font-size: 22px; }
  .hero-title { font-size: 20px; }
  .hero-header { flex-direction: column; gap: 2px; }
  .hero-vibe { text-align: left; }
  .hero-actions { flex-wrap: wrap; }
  .stat-row { gap: 7px; }
  .stat { padding: 12px 10px 11px; }
  .stat-num { font-size: 24px; }
  .stat-label { font-size: 9px; letter-spacing: 0.05em; }
  .cat-bar-label { width: 76px; font-size: 11px; }
  .tab { padding: 9px 13px; }
}

/* History strip */
.history-section { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--color-border); }
.history-title { font-size: 10px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--color-secondary-light); margin-bottom: 0.75rem; }
.history-empty { font-size: 12px; color: var(--color-text-muted); padding: 0.5rem 0; }
.history-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--color-border); font-size: 12px; }
.history-row:last-child { border-bottom: none; }
.history-row-main { flex: 1; min-width: 0; color: var(--color-text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-row-title { color: var(--color-text); font-weight: 500; }
.history-row-date { color: var(--color-text-muted); font-size: 11px; white-space: nowrap; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="app">
<div class="app-header">
  <h1>David's Closet</h1>
  <div class="app-header-actions">
    <button class="icon-btn" onclick="openSettings()" title="Settings" id="settings-btn">⚙</button>
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle dark mode" id="theme-toggle">☾</button>
  </div>
</div>
<div class="status-bar"><div class="status-dot" id="status-dot"></div><span id="status-text">Loading...</span></div>
<div class="tabs">
  <button class="tab active" onclick="showTab('today',this)">Today</button>
  <button class="tab" onclick="showTab('ask',this)">Ask</button>
  <button class="tab" onclick="showTab('insights',this)">Insights</button>
  <button class="tab" onclick="showTab('closet',this)">Closet</button>
</div>

<!-- TODAY TAB -->
<div id="tab-today" class="panel active">
  <div class="today-head">
    <div class="today-date" id="today-date"></div>
    <div class="day-toggle" id="day-toggle">
      <button type="button" class="day-opt active" data-day="today" onclick="selectDay('today')">Today</button>
      <button type="button" class="day-opt" data-day="tomorrow" onclick="selectDay('tomorrow')">Tomorrow</button>
    </div>
  </div>
  <div class="weather-strip" id="today-weather"><div class="weather-unavailable">Checking the sky…</div></div>
  <div class="chip-row" id="occasion-chips">
    <button type="button" class="btn-opt" data-occasion="Office" onclick="selectOccasion(this)">Office</button>
    <button type="button" class="btn-opt" data-occasion="Dinner out" onclick="selectOccasion(this)">Dinner out</button>
    <button type="button" class="btn-opt" data-occasion="Weekend" onclick="selectOccasion(this)">Weekend</button>
    <button type="button" class="btn-opt" data-occasion="Date night" onclick="selectOccasion(this)">Date night</button>
    <button type="button" class="btn-opt" data-occasion="Smart event" onclick="selectOccasion(this)">Smart event</button>
  </div>
  <div id="today-hero"></div>
  <div id="trip-banner"></div>
  <button type="button" class="trip-entry" id="trip-entry" onclick="openTripModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M9 8V6a3 3 0 0 1 3-3h0a3 3 0 0 1 3 3v2"/><path d="M9 12v4M15 12v4"/></svg>
    <span>Plan a trip</span>
  </button>
</div>

<!-- ASK TAB -->
<div id="tab-ask" class="panel">
  <div class="chat-header" id="chat-header" style="display:none">
    <span class="chat-header-title">Conversation</span>
    <button class="chat-reset" onclick="resetChat()" type="button">New conversation</button>
  </div>
  <div id="ask-thread" class="chat-thread"></div>
  <div class="ask-form">
    <textarea class="ask-input" id="ask-input" rows="2" placeholder="Where are you going? e.g. dinner at Carbone, client drinks at the NoMad bar, rooftop in the West Village Saturday night..." onkeydown="handleAskKey(event)"></textarea>
    <button class="gen-btn" onclick="askClaude()" id="ask-btn">Ask →</button>
  </div>
  <div class="history-section">
    <div class="history-title">Worn recently</div>
    <div id="history-container"></div>
  </div>
</div>

<!-- INSIGHTS TAB -->
<div id="tab-insights" class="panel">
  <div id="insights-body"><div class="insights-state">Reading your closet…</div></div>
</div>

<!-- CLOSET TAB -->
<div id="tab-closet" class="panel">
  <div class="add-bar">
    <input class="search-box" style="margin-bottom:0;flex:1" type="text" placeholder="Search your wardrobe..." oninput="renderItems(this.value)" id="closet-search">
    <button class="add-btn" onclick="openAddForm()">+ Add item</button>
  </div>
  <div class="cat-grid" id="cat-grid"></div>
  <div id="items-list"></div>
</div>

<!-- ADD/EDIT ITEM MODAL -->
<div class="modal-backdrop" id="item-modal" style="display:none" onclick="if(event.target===this)closeItemModal()">
  <div class="modal">
    <h2 id="modal-title">Add item</h2>
    <div class="form-row">
      <label>Item name</label>
      <input type="text" id="f-item" placeholder="e.g. Navy cashmere sweater">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Category</label>
        <select id="f-cat" onchange="updateSubOptions()">
          <option value="Outerwear">Outerwear</option>
          <option value="Tailoring">Tailoring</option>
          <option value="Tops">Tops</option>
          <option value="Knitwear">Knitwear</option>
          <option value="Pants">Pants</option>
          <option value="Shoes">Shoes</option>
          <option value="Accessories">Accessories</option>
        </select>
      </div>
      <div class="form-row">
        <label>Subcategory</label>
        <select id="f-sub"></select>
      </div>
    </div>
    <div class="form-row">
      <label>Texture</label>
      <input type="text" id="f-texture" placeholder="e.g. cashmere, suede, wool">
    </div>
    <div class="form-row">
      <label>Season</label>
      <div class="btn-group" id="f-s-group">
        <button type="button" class="btn-opt" data-value="all" onclick="toggleSeasonOpt(this)">All year</button>
        <button type="button" class="btn-opt" data-value="fall" onclick="toggleSeasonOpt(this)">Fall</button>
        <button type="button" class="btn-opt" data-value="winter" onclick="toggleSeasonOpt(this)">Winter</button>
        <button type="button" class="btn-opt" data-value="spring" onclick="toggleSeasonOpt(this)">Spring</button>
        <button type="button" class="btn-opt" data-value="summer" onclick="toggleSeasonOpt(this)">Summer</button>
      </div>
    </div>
    <div class="form-row">
      <label>Tone</label>
      <div class="btn-group" id="f-dark-group">
        <button type="button" class="btn-opt" data-value="true" onclick="selectOpt(this,'f-dark-group')">Dark</button>
        <button type="button" class="btn-opt" data-value="false" onclick="selectOpt(this,'f-dark-group')">Light / neutral</button>
      </div>
    </div>
    <div class="form-row">
      <label>Color</label>
      <div class="btn-group" id="f-color-group">
        <button type="button" class="btn-opt" data-value="black" onclick="selectOpt(this,'f-color-group')">Black</button>
        <button type="button" class="btn-opt" data-value="navy" onclick="selectOpt(this,'f-color-group')">Navy</button>
        <button type="button" class="btn-opt" data-value="grey" onclick="selectOpt(this,'f-color-group')">Grey</button>
        <button type="button" class="btn-opt" data-value="brown" onclick="selectOpt(this,'f-color-group')">Brown</button>
        <button type="button" class="btn-opt" data-value="camel" onclick="selectOpt(this,'f-color-group')">Camel</button>
        <button type="button" class="btn-opt" data-value="off-white" onclick="selectOpt(this,'f-color-group')">Off-white</button>
        <button type="button" class="btn-opt" data-value="beige" onclick="selectOpt(this,'f-color-group')">Beige</button>
        <button type="button" class="btn-opt" data-value="green" onclick="selectOpt(this,'f-color-group')">Green</button>
        <button type="button" class="btn-opt" data-value="blue" onclick="selectOpt(this,'f-color-group')">Blue</button>
        <button type="button" class="btn-opt" data-value="white" onclick="selectOpt(this,'f-color-group')">White</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeItemModal()">Cancel</button>
      <button class="btn-save" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<!-- TRIP MODAL — body rendered by JS (form → loading → plan) -->
<div class="modal-backdrop" id="trip-modal" style="display:none" onclick="if(event.target===this)closeTripModal()">
  <div class="modal trip-modal" id="trip-modal-box"></div>
</div>

<!-- CLOUD AUTH GATE — blocking sign-in when served from the cloud; cancellable
     "set up phone access" flow when served locally -->
<div class="modal-backdrop" id="auth-gate" style="display:none">
  <div class="modal" style="max-width:400px">
    <h2 id="auth-title">David's Closet</h2>
    <p id="auth-sub" style="font-size:13px;color:var(--color-text-muted);line-height:1.6;margin:0.25rem 0 1rem">Sign in to your closet.</p>
    <div class="form-row">
      <label>Email</label>
      <input type="email" id="auth-email" autocomplete="username" placeholder="you@example.com">
    </div>
    <div class="form-row" style="margin-top:0.75rem">
      <label>Password</label>
      <input type="password" id="auth-password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <div id="auth-msg" style="display:none;font-size:12.5px;line-height:1.5;padding:8px 10px;border-radius:var(--radius-sm);margin-top:0.75rem;background:var(--color-bg-subtle)"></div>
    <div class="modal-actions" style="margin-top:1rem">
      <button class="btn-cancel" id="auth-cancel" onclick="hideAuthGate()" style="display:none">Cancel</button>
      <button class="btn-cancel" id="auth-signup-btn" onclick="authSubmit('signup')">Create account</button>
      <button class="btn-save" id="auth-signin-btn" onclick="authSubmit('signin')">Sign in</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-backdrop" id="settings-modal" style="display:none" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <h2>Settings</h2>
    <div class="form-row">
      <label>Style profile <span style="text-transform:none;letter-spacing:0;opacity:0.7">— fed to Ask on every request</span></label>
      <textarea id="settings-style-profile" rows="6" placeholder="Describe your style so Ask has something to work with..."></textarea>
    </div>
    <div class="form-row" style="margin-top:1.25rem">
      <label>API status</label>
      <div id="settings-api-status" style="font-size:12px;color:var(--color-text-muted);padding:8px 10px;background:var(--color-bg-subtle);border-radius:var(--radius-sm)">Checking…</div>
    </div>
    <div class="form-row" style="margin-top:1.25rem">
      <label>On your phone</label>
      <div id="settings-phone-hint" style="font-size:12px;color:var(--color-text-muted);padding:8px 10px;background:var(--color-bg-subtle);border-radius:var(--radius-sm);line-height:1.6">Checking…</div>
    </div>
    <div class="form-row" style="margin-top:1.25rem">
      <label>Cloud account</label>
      <div id="settings-cloud" style="font-size:12px;color:var(--color-text-muted);padding:8px 10px;background:var(--color-bg-subtle);border-radius:var(--radius-sm);line-height:1.6">…</div>
      <div id="settings-qr" style="margin-top:8px;text-align:center"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let W = [];
let savedOutfits = [];
let feedback = [];
let settings = {};
let editingId = null;
let selectedCat = null;
// Chat state — ephemeral per page load.
//   chatThread: alternating user/assistant turns. Assistant turns carry { content (reply text), outfits: [3] }.
//   cardState: per-card UI state keyed by `${turnIdx}-${cardIdx}` → { excluded: {slot: [ids]}, wore, saved }.
let chatThread = [];
let cardState = {};

const SUB_OPTIONS = {

function apiFetch(path, opts) {
  if (!IS_CLOUD) return fetch(path, opts);
  const o = Object.assign({}, opts || {});
  o.headers = Object.assign({}, o.headers || {});
  o.headers['Authorization'] = 'Bearer ' + (cloudSession ? cloudSession.access_token : CLOUD_KEY);
  o.headers['apikey'] = CLOUD_KEY;
  let target = path;
  if (path === '/data/wardrobe.json') {
    target = CLOUD_API + '/wardrobe';
    if ((o.method || 'GET').toUpperCase() === 'POST') o.method = 'PUT';
  } else if (path.startsWith('/api/')) {
    target = CLOUD_API + path.slice(4);
  }
  return fetch(target, o).then(r => {
    if (r.status === 401) showAuthGate('gate'); // session expired — re-gate
    return r;
  });
}

async function initCloud() {
  if (typeof window.supabase === 'undefined') return false; // CDN unreachable; local mode unaffected
  sb = window.supabase.createClient(CLOUD_URL, CLOUD_KEY);
  const got = await sb.auth.getSession();
  cloudSession = (got.data && got.data.session) || null;
  sb.auth.onAuthStateChange((_evt, s) => { cloudSession = s || null; });
  return !!cloudSession;
}

// DOM-built (no innerHTML with dynamic values) per security guidance.
function elMake(tag, text, attrs) {
  const n = document.createElement(tag);
  if (text != null) n.textContent = text;
  for (const k in (attrs || {})) n.setAttribute(k, attrs[k]);
  return n;
}
function linkMake(text, onClick) {
  const a = elMake('a', text, { href: '#' });
  a.addEventListener('click', (e) => { e.preventDefault(); onClick(); });
  return a;
}

function renderQr(text, container) {
  const draw = () => {
    try {
      const q = qrcode(0, 'M');
      q.addData(text); q.make();
      const img = elMake('img', null, { alt: 'Install QR code' });
      img.src = q.createDataURL(4, 8);
      img.style.imageRendering = 'pixelated';
      img.style.width = '164px';
      container.replaceChildren(img);
      const cap = elMake('div', text);
      cap.style.cssText = 'font-size:11px;color:var(--color-text-muted);margin-top:6px;word-break:break-all';
      container.appendChild(cap);
    } catch (e) { container.textContent = text; }
  };
  if (typeof qrcode !== 'undefined') return draw();
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js';
  s.onload = draw;
  document.head.appendChild(s);

const ASK_PLACEHOLDER_INITIAL = "Where are you going? e.g. dinner at Carbone, client drinks at the NoMad bar, rooftop in the West Village Saturday night...";
const ASK_PLACEHOLDER_FOLLOWUP = "Tell me what to change — e.g. more casual, swap the shoes on option 2, different layer, warmer...";

function userMessageForTurn(turnIdx) {
  for (let i = turnIdx - 1; i >= 0; i--) {
    if (chatThread[i].role === 'user') return chatThread[i].content;
  }
  return '';

async function askClaude() {
  const input = document.getElementById('ask-input');
  const msg = input.value.trim();
  if (!msg) { input.focus(); return; }

  // Optimistically push the user turn + a "thinking" assistant placeholder.
  chatThread.push({ role: 'user', content: msg });
  chatThread.push({ role: 'assistant', content: '', outfits: [], pending: true });
  input.value = '';
  renderThread();

  const btn = document.getElementById('ask-btn');
  btn.disabled = true;

  // Strip outfits + pending flag before sending — the model only needs role/content.
  const wireMessages = chatThread
    .filter(m => !m.pending)
    .map(m => ({ role: m.role, content: m.content || '' }))
    .filter(m => m.content);

  const abort = new AbortController();
  const timer = setTimeout(() => abort.abort(), 60000);
  try {
    const r = await apiFetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: wireMessages }),
      signal: abort.signal,
    });
    clearTimeout(timer);
    const data = await r.json();
    if (!r.ok || data.error) {
      chatThread[chatThread.length - 1] = { role: 'assistant', content: data.error || 'Something went wrong — try again.', outfits: [], errored: true };
      renderThread();
      return;
    }
    const outfits = Array.isArray(data.outfits) ? data.outfits : [];
    if (!outfits.length) {
      chatThread[chatThread.length - 1] = { role: 'assistant', content: 'Response was missing outfit data. Try rephrasing.', outfits: [], errored: true };
      renderThread();
      return;
    }
    chatThread[chatThread.length - 1] = {
      role: 'assistant',
      content: data.reply || '',
      outfits: outfits.map(o => ({
        slots: o.slots || {},
        title: o.title || 'Option',
        vibe: o.vibe || '',
        rationale: o.rationale || '',
      })),
    };
    btn.textContent = 'Send →';
    renderThread();
  } catch(e) {
    clearTimeout(timer);
    const errMsg = e.name === 'AbortError'
      ? 'Took too long — try again.'
      : 'Connection error — is the server running?';
    chatThread[chatThread.length - 1] = { role: 'assistant', content: errMsg, outfits: [], errored: true };
    renderThread();
  } finally {
    btn.disabled = false;
  }
}

function renderThread() {
  const thread = document.getElementById('ask-thread');
  const header = document.getElementById('chat-header');
  if (!thread) return;
  if (header) header.style.display = chatThread.length ? 'flex' : 'none';
  syncAskPlaceholder();
  if (!chatThread.length) {
    thread.innerHTML = '';
    return;
  }

  const html = chatThread.map((turn, turnIdx) => {
    if (turn.role === 'user') {
      return `<div class="chat-turn"><div class="chat-msg-user">${esc(turn.content)}</div></div>`;
    }
    // assistant
    if (turn.pending) {
      return `<div class="chat-turn"><div class="chat-msg-assistant"><span class="ask-thinking">Thinking</span></div></div>`;
    }
    const replyHtml = turn.content ? `<div class="chat-msg-assistant">${esc(turn.content)}</div>` : '';
    if (turn.errored || !turn.outfits || !turn.outfits.length) {
      return `<div class="chat-turn">${replyHtml}</div>`;
    }
    const cardsHtml = turn.outfits.map((card, cardIdx) => renderAskCardHtml(turnIdx, cardIdx, card)).join('');
    return `<div class="chat-turn">${replyHtml}<div class="card-group">${cardsHtml}</div></div>`;
  }).join('');

  thread.innerHTML = html;
  thread.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function renderAskCardHtml(turnIdx, cardIdx, card) {
  const { slots = {}, title = '', vibe = '', rationale = '' } = card;
  const state = getCardState(turnIdx, cardIdx);

  const slotHtml = SLOT_ORDER.map(slotKey => {
    const slot = slots[slotKey] || {};
    const w = slot.id ? W.find(x => x.id === slot.id) : null;
    const required = (slotKey === 'top' || slotKey === 'bottom' || slotKey === 'shoes');
    const bodyHtml = w
      ? `<div class="slot-item">${esc(w.item)}</div>${slot.reason ? `<div class="slot-reason">${esc(slot.reason)}</div>` : ''}`
      : `<div class="slot-empty">${required ? '— missing —' : '— skipped —'}</div>`;
    return `<div class="slot-row">
      <span class="slot-label">${SLOT_LABELS[slotKey]}</span>
      <div class="slot-body">${bodyHtml}</div>
      <button class="slot-swap" onclick="openSlotPicker('ask', ${turnIdx}, ${cardIdx}, '${slotKey}')">${w ? 'swap' : 'add'} ▾</button>
    </div>${pickerPanelHtml('ask', turnIdx, cardIdx, slotKey, slot.id || null)}`;
  }).join('');

  return `
    <div class="ask-card">
      <div class="ask-card-index">Option ${cardIdx + 1}</div>
      <div class="ask-card-header">
        <span class="ask-card-title">${esc(title)}</span>
        <span class="ask-card-vibe">${esc(vibe)}</span>
      </div>
      ${rationale ? `<div class="ask-rationale">${esc(rationale)}</div>` : ''}
      <div class="slot-list">${slotHtml}</div>
      <div class="card-actions">
        <button class="card-action${state.saved ? ' active' : ''}" ${state.saved ? 'disabled' : ''} onclick="saveAskOutfit(${turnIdx}, ${cardIdx})">${state.saved ? '♥ saved' : '♡ save'}</button>
        <button class="card-action${state.wore ? ' active' : ''}" ${state.wore ? 'disabled' : ''} onclick="wearAskOutfit(${turnIdx}, ${cardIdx})">${state.wore ? '✓ worn' : '✓ wore this'}</button>
        <button class="card-action${state.liked ? ' active' : ''}" ${state.liked ? 'disabled' : ''} onclick="likeAskOutfit(${turnIdx}, ${cardIdx})">${state.liked ? '↑ liked' : '↑ like'}</button>
      </div>
    </div>`;
}

async function swapSlot(turnIdx, cardIdx, slotKey, btnEl) {
  const card = getCard(turnIdx, cardIdx);
  if (!card) return;
  btnEl.disabled = true;
  btnEl.classList.add('swapping');

  const state = getCardState(turnIdx, cardIdx);
  const currentIds = {};
  SLOT_ORDER.forEach(k => { currentIds[k] = (card.slots[k] || {}).id || null; });

  const currentId = (card.slots[slotKey] || {}).id;
  const excluded = state.excluded[slotKey] || [];
  if (currentId && !excluded.includes(currentId)) excluded.push(currentId);

  const abort = new AbortController();
  const timer = setTimeout(() => abort.abort(), 30000);
  try {
    const r = await apiFetch('/api/chat/swap', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: userMessageForTurn(turnIdx),
        slot: slotKey,
        current: currentIds,
        exclude: excluded,
      }),
      signal: abort.signal,
    });
    clearTimeout(timer);
    const data = await r.json();
    if (!r.ok || data.error) {
      alert(data.error || 'Swap failed — try again.');
      return;
    }
    card.slots[slotKey] = { id: data.id || null, reason: data.reason || '' };
    state.excluded[slotKey] = excluded;
    renderThread();
  } catch(e) {
    clearTimeout(timer);
    alert(e.name === 'AbortError' ? 'Swap took too long — try again.' : 'Connection error.');
  } finally {
    btnEl.disabled = false;
    btnEl.classList.remove('swapping');
  }
}

function collectCardItems(card) {
  if (!card) return [];
  return SLOT_ORDER.map(k => (card.slots[k] || {}).id)
    .filter(Boolean)
    .map(id => W.find(w => w.id === id))
    .filter(Boolean);
}

async function saveAskOutfit(turnIdx, cardIdx) {
  const card = getCard(turnIdx, cardIdx);
  const state = getCardState(turnIdx, cardIdx);
  if (!card || state.saved) return;
  const items = collectCardItems(card);
  if (!items.length) return;
  const occasion = userMessageForTurn(turnIdx);
  const now = new Date().toISOString();
  savedOutfits.unshift({
    id: uid(),
    title: card.title,
    vibe: card.vibe,
    items: items.map(x => x.item),
    note: card.rationale || null,
    savedAt: now,
    wore: false,
  });
  feedback.unshift({
    id: uid(), type: 'favorite',
    occasion,
    season: '',
    items: items.map(x => ({ id: x.id, item: x.item })),
    timestamp: now,
  });
  state.saved = true;
  await saveToServer();
  renderThread();
  renderHistory();
}

async function wearAskOutfit(turnIdx, cardIdx) {
  const card = getCard(turnIdx, cardIdx);
  const state = getCardState(turnIdx, cardIdx);
  if (!card || state.wore) return;
  const items = collectCardItems(card);
  if (!items.length) return;
  const occasion = userMessageForTurn(turnIdx);
  const now = new Date().toISOString();
  savedOutfits.unshift({
    id: uid(),
    title: card.title,
    vibe: card.vibe,
    items: items.map(x => x.item),
    note: card.rationale || null,
    savedAt: now,
    wore_at: now,
    wore: true,
  });
  feedback.unshift({
    id: uid(), type: 'picked',
    occasion,
    season: '',
    items: items.map(x => ({ id: x.id, item: x.item })),
    timestamp: now,
  });
  state.wore = true;
  insightsStale = true;
  await saveToServer();
  renderThread();
  renderHistory();
}

async function likeAskOutfit(turnIdx, cardIdx) {
  const card = getCard(turnIdx, cardIdx);
  const state = getCardState(turnIdx, cardIdx);
  if (!card || state.liked) return;
  const items = collectCardItems(card);
  if (!items.length) return;
  feedback.unshift({
    id: uid(), type: 'like',
    occasion: userMessageForTurn(turnIdx),
    season: '',
    items: items.map(x => ({ id: x.id, item: x.item })),
    timestamp: new Date().toISOString(),
  });
  state.liked = true;
  await saveToServer();
  renderThread();
}

// ── Today view ───────────────────────────────────────────────────────────────
// Page-state cache: weather + hero outfit load once on app open; refetch only on
// chip change or "Another option" — never on tab switches.
// NOTE: all dynamic strings rendered below pass through esc() (same XSS-safe
// pattern as the rest of this file).
function freshDayState() {
  return {
    outfit: null,       // { title, vibe, reason, slots: {k: {id, reason}} }
    wore: false,
    saved: false,
    excluded: { outer: [], top: [], bottom: [], shoes: [], accessory: [] },
  };
}
let todayState = {
  weather: undefined,   // undefined = loading, null = unavailable, object = data
  day: 'today',         // 'today' | 'tomorrow' — which day the view shows
  occasion: null,       // selected chip label, or null = versatile day
  loading: false,
  error: null,
  // Outfits are cached per day so toggling Today/Tomorrow doesn't re-compose.
  byDay: { today: freshDayState(), tomorrow: freshDayState() },
};
function dayState() { return todayState.byDay[todayState.day]; }
let todayInitialized = false;

const OCCASION_PROMPTS = {
  'Office':      'a day at the office — polished business casual',
  'Dinner out':  'dinner out at a good restaurant in the city',
  'Weekend':     'a relaxed weekend day around the city',
  'Date night':  'date night — sharp, warm, a little elevated',
  'Smart event': 'a smart event — elevated dress code, refined',
};

function todayOccasionText() {
  return todayState.occasion ? OCCASION_PROMPTS[todayState.occasion] : 'a regular day — versatile smart casual';
}

function initToday() {
  if (todayInitialized) return;
  todayInitialized = true;
  renderTodayDate();
  loadTodayWeather();
  loadTrips();
  requestToday();
}

function renderTodayDate() {
  const el = document.getElementById('today-date');
  if (!el) return;
  const d = new Date();
  if (todayState.day === 'tomorrow') d.setDate(d.getDate() + 1);
  el.textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function selectDay(day) {
  if (day === todayState.day || todayState.loading) return;
  todayState.day = day;
  todayState.error = null;
  document.querySelectorAll('#day-toggle .day-opt').forEach(b =>
    b.classList.toggle('active', b.dataset.day === day));
  renderTodayDate();
  renderWeatherStrip();
  if (dayState().outfit) {
    renderTodayHero();       // cached — no re-compose on toggle
  } else {
    requestToday();
  }
}

async function loadTodayWeather() {
  try {
    const r = await apiFetch('/api/weather');
    const data = await r.json();
    todayState.weather = (data && data.ok !== false && typeof data.temp === 'number') ? data : null;
  } catch (e) {
    todayState.weather = null;
  }
  renderWeatherStrip();
}

// Simple line icons — stroke currentColor, no emoji. Static markup, no user input.
function weatherIconSvg(code) {
  const open = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">';
  const cloud = '<path d="M7 17.5a4 4 0 1 1 .6-7.96A5 5 0 0 1 17.3 10.6a3.5 3.5 0 0 1-.3 6.9H7z"/>';
  let body;
  if (code <= 1) {
    body = '<circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"/>';
  } else if (code === 2) {
    body = '<circle cx="16.5" cy="7.5" r="2.6"/><path d="M16.5 2.8v1.4M21.2 7.5h-1.4M19.8 4.2l-1 1M19.8 10.8l-1-1"/>'
         + '<path d="M6.5 19a3.6 3.6 0 1 1 .55-7.16A4.5 4.5 0 0 1 15.8 12.8a3.1 3.1 0 0 1-.3 6.2h-9z"/>';
  } else if (code === 3) {
    body = cloud;
  } else if (code === 45 || code === 48) {
    body = '<path d="M4 9h16M6 13h13M4 17h14"/>';
  } else if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) {
    body = '<path d="M7 15a4 4 0 1 1 .6-7.96A5 5 0 0 1 17.3 8.1a3.5 3.5 0 0 1-.3 6.9H7z"/>'
         + '<path d="M8.5 18l-1 2.5M12.5 18l-1 2.5M16.5 18l-1 2.5"/>';
  } else if ((code >= 71 && code <= 77) || code === 85 || code === 86) {
    body = '<path d="M7 15a4 4 0 1 1 .6-7.96A5 5 0 0 1 17.3 8.1a3.5 3.5 0 0 1-.3 6.9H7z"/>'
         + '<path d="M8 18.5h.01M12 20h.01M16 18.5h.01M10 21h.01M14 21.5h.01" stroke-width="2"/>';
  } else if (code >= 95) {
    body = '<path d="M7 14a4 4 0 1 1 .6-7.96A5 5 0 0 1 17.3 7.1a3.5 3.5 0 0 1-.3 6.9H8"/>'
         + '<path d="M12.5 14.5L10 18.5h3L11 22"/>';
  } else {
    body = cloud;
  }
  return open + body + '</svg>';
}

function renderWeatherStrip() {
  const el = document.getElementById('today-weather');
  if (!el) return;
  const w = todayState.weather;
  if (w === undefined) {
    el.innerHTML = '<div class="weather-unavailable">Checking the sky…</div>';
    return;
  }
  if (!w) {
    el.innerHTML = '<div class="weather-unavailable">—&ensp;Weather unavailable</div>';
    return;
  }
  if (todayState.day === 'tomorrow') {
    // Forecast-only state: no current temp / feels-like — it's tomorrow.
    const t = w.tomorrow;
    if (!t) {
      el.innerHTML = '<div class="weather-unavailable">—&ensp;Forecast unavailable</div>';
      return;
    }
    const tPrecip = (t.precip_prob || 0) > 15 ? `${Number(t.precip_prob)}% rain` : 'rain unlikely';
    el.innerHTML = `
      <div class="weather-icon">${weatherIconSvg(Number(t.code) || 0)}</div>
      <div>
        <div class="weather-temp">${Math.round(t.hi)}° <span class="weather-temp-lo">/ ${Math.round(t.lo)}°</span></div>
        <div class="weather-feels">tomorrow's forecast</div>
      </div>
      <div class="weather-meta">
        <div class="weather-summary">${esc(t.summary || '')}</div>
        <div class="weather-hilo">${esc(tPrecip)}</div>
      </div>`;
    return;
  }
  const precip = (w.precip_prob || 0) > 15 ? ` · ${Number(w.precip_prob)}% rain` : '';
  el.innerHTML = `
    <div class="weather-icon">${weatherIconSvg(Number(w.code) || 0)}</div>
    <div>
      <div class="weather-temp">${Math.round(w.temp)}°</div>
      <div class="weather-feels">feels ${Math.round(w.feels_like)}°</div>
    </div>
    <div class="weather-meta">
      <div class="weather-summary">${esc(w.summary || '')}</div>
      <div class="weather-hilo">H ${Math.round(w.hi)}° · L ${Math.round(w.lo)}°${precip}</div>
    </div>`;
}

function selectOccasion(btn) {
  const val = btn.dataset.occasion;
  todayState.occasion = (todayState.occasion === val) ? null : val;
  document.querySelectorAll('#occasion-chips .btn-opt').forEach(b =>
    b.classList.toggle('active', b.dataset.occasion === todayState.occasion));
  // Occasion changed — both day caches are stale; refetch the visible day only.
  todayState.byDay = { today: freshDayState(), tomorrow: freshDayState() };
  requestToday();
}

async function requestToday(excludeIds = []) {
  const day = todayState.day; // capture — user may toggle while in flight
  todayState.loading = true;
  todayState.error = null;
  renderTodayHero();
  const abort = new AbortController();
  const timer = setTimeout(() => abort.abort(), 60000);
  try {
    const r = await apiFetch('/api/today', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        occasion: todayState.occasion ? todayOccasionText() : null,
        exclude_ids: excludeIds,
        day,
      }),
      signal: abort.signal,
    });
    clearTimeout(timer);
    const data = await r.json();
    if (!r.ok || data.error || data.ok === false) {
      throw new Error(data.error || 'Could not compose an outfit — try again.');
    }
    const slots = {};
    SLOT_ORDER.forEach(k => { slots[k] = { id: (data.slots || {})[k] || null, reason: '' }; });
    todayState.byDay[day] = freshDayState();
    todayState.byDay[day].outfit = {
      title: data.title || (day === 'tomorrow' ? 'Tomorrow' : 'Today'),
      vibe: data.vibe || '',
      reason: data.reason || '',
      slots,
    };
  } catch (e) {
    clearTimeout(timer);
    todayState.error = e.name === 'AbortError'
      ? 'Took too long — try again.'
      : (e.message || 'Connection error — is the server running?');
  } finally {
    todayState.loading = false;
    renderTodayHero();
  }
}

function renderTodayHero() {
  const el = document.getElementById('today-hero');
  if (!el) return;
  const dayWord = todayState.day === 'tomorrow' ? 'Tomorrow' : 'Today';

  if (todayState.loading) {
    el.innerHTML = `
      <div class="hero-card" id="today-skeleton">
        <div class="hero-eyebrow">${dayWord}'s outfit</div>
        <div class="today-composing"><span class="ask-thinking">Composing ${dayWord.toLowerCase()}'s outfit</span></div>
        <div class="skeleton-line" style="width:55%;height:18px;margin-bottom:16px"></div>
        <div class="skeleton-line" style="width:90%;margin-bottom:10px"></div>
        <div class="skeleton-line" style="width:74%;margin-bottom:10px"></div>
        <div class="skeleton-line" style="width:82%;margin-bottom:10px"></div>
        <div class="skeleton-line" style="width:66%"></div>
      </div>`;
    return;
  }

  if (todayState.error) {
    el.innerHTML = `
      <div class="hero-card">
        <div class="hero-eyebrow">${dayWord}'s outfit</div>
        <div class="today-error">${esc(todayState.error)}</div>
        <button class="card-action" onclick="requestToday()">Try again</button>
      </div>`;
    return;
  }

  const ds = dayState();
  const o = ds.outfit;
  if (!o) { el.innerHTML = ''; return; }

  const slotHtml = SLOT_ORDER.map(slotKey => {
    const slot = o.slots[slotKey] || {};
    const w = slot.id ? W.find(x => x.id === slot.id) : null;
    const required = (slotKey === 'top' || slotKey === 'bottom' || slotKey === 'shoes');
    const bodyHtml = w
      ? `<div class="slot-item">${esc(w.item)}</div>${slot.reason ? `<div class="slot-reason">${esc(slot.reason)}</div>` : ''}`
      : `<div class="slot-empty">${required ? '— missing —' : '— skipped —'}</div>`;
    // Skipped/missing slots offer "add" (fill the slot in) rather than a
    // nonsensical "swap" of nothing — same endpoint, honest affordance.
    return `<div class="slot-row">
      <span class="slot-label">${SLOT_LABELS[slotKey]}</span>
      <div class="slot-body">${bodyHtml}</div>
      <button class="slot-swap" onclick="openSlotPicker('today', 0, 0, '${slotKey}')">${w ? 'swap' : 'add'} ▾</button>
    </div>${pickerPanelHtml('today', 0, 0, slotKey, slot.id || null)}`;
  }).join('');

  el.innerHTML = `
    <div class="hero-card">
      <div class="hero-eyebrow">${dayWord}'s outfit</div>
      <div class="hero-header">
        <span class="hero-title">${esc(o.title)}</span>
        <span class="hero-vibe">${esc(o.vibe)}</span>
      </div>
      ${o.reason ? `<div class="hero-reason">${esc(o.reason)}</div>` : ''}
      <div class="slot-list">${slotHtml}</div>
      <div class="hero-actions">
        <button class="card-action primary${ds.wore ? ' active' : ''}" ${ds.wore ? 'disabled' : ''} onclick="wearToday()">${ds.wore ? '✓ worn' : 'Wear this'}</button>
        <button class="card-action${ds.saved ? ' active' : ''}" ${ds.saved ? 'disabled' : ''} onclick="saveTodayLook()">${ds.saved ? '★ saved' : '☆ Save this look'}</button>
        <button class="card-action" onclick="anotherToday()">Another option</button>
      </div>
    </div>`;
}

// ── Manual slot picker (build your own outfit) ───────────────────────────────
// Each slot's swap/add opens a dropdown of the user's OWN items for that slot,
// filtered to the slot's categories and the current season (with a "show all
// seasons" override). "Let Claude pick" preserves the AI swap. Picking an item
// just sets the slot — the preference boost happens when the look is saved.
// Shared by the Today view (ctx 'today') and the Ask result cards (ctx 'ask').
const SLOT_CATS = {
  outer: ['Outerwear', 'Tailoring'],
  top: ['Tops', 'Knitwear'],
  bottom: ['Pants'],
  shoes: ['Shoes'],
  accessory: ['Accessories'],
};
function currentAllowedSeasonTags() {
  const m = new Date().getMonth() + 1; // mirrors server season_for_month()
  if (m === 12 || m === 1 || m === 2) return ['winter', 'fw', 'all', 'formal'];
  if (m >= 3 && m <= 5) return ['spring', 'ss', 'shoulder', 'all', 'formal'];
  if (m >= 6 && m <= 8) return ['summer', 'ss', 'all', 'formal'];
  return ['fall', 'fw', 'shoulder', 'all', 'formal'];
}
function itemInSeason(item, allowed) {
  const tags = String(item.s || 'all').split(',').map(t => t.trim()).filter(Boolean);
  if (!tags.length) return true;
  return tags.some(t => allowed.includes(t));
}
function eligibleItemsForSlot(slotKey, allSeasons) {
  const cats = SLOT_CATS[slotKey] || [];
  let items = W.filter(w => cats.includes(w.cat));
  if (!allSeasons) {
    const allowed = currentAllowedSeasonTags();
    const inS = items.filter(w => itemInSeason(w, allowed));
    if (inS.length) items = inS; // never present an empty list — fall back to all
  }
  return items.slice().sort((a, b) =>
    (a.sub || '').localeCompare(b.sub || '') || (a.item || '').localeCompare(b.item || ''));
}

let pickerOpen = null; // { ctx, turnIdx, cardIdx, slotKey, allSeasons } or null
let pickerBusy = false; // a "Let Claude pick" AI swap is in flight — freeze picker input
function pickerMatches(ctx, turnIdx, cardIdx, slotKey) {
  return !!pickerOpen && pickerOpen.ctx === ctx && pickerOpen.slotKey === slotKey
    && (ctx !== 'ask' || (pickerOpen.turnIdx === turnIdx && pickerOpen.cardIdx === cardIdx));
}
function rerenderFor(ctx) { if (ctx === 'today') renderTodayHero(); else renderThread(); }

function openSlotPicker(ctx, turnIdx, cardIdx, slotKey) {
  pickerOpen = pickerMatches(ctx, turnIdx, cardIdx, slotKey)
    ? null : { ctx, turnIdx, cardIdx, slotKey, allSeasons: false };
  rerenderFor(ctx);
}
function togglePickerSeasons() {
  if (!pickerOpen) return;
  pickerOpen.allSeasons = !pickerOpen.allSeasons;
  rerenderFor(pickerOpen.ctx);
}
function setSlotItem(ctx, turnIdx, cardIdx, slotKey, itemId) {
  if (ctx === 'today') {
    const ds = dayState(); if (!ds.outfit) return;
    ds.outfit.slots[slotKey] = { id: itemId || null, reason: '' };
    ds.excluded[slotKey] = []; // a manual choice overrides AI exclusions
  } else {
    const card = getCard(turnIdx, cardIdx); if (!card) return;
    card.slots[slotKey] = { id: itemId || null, reason: '' };
    getCardState(turnIdx, cardIdx).excluded[slotKey] = [];
  }
}
function pickSlotItem(ctx, turnIdx, cardIdx, slotKey, itemId) {
  if (pickerBusy) return; // ignore manual picks while an AI swap is resolving
  setSlotItem(ctx, turnIdx, cardIdx, slotKey, itemId);
  pickerOpen = null;
  rerenderFor(ctx);
}
async function claudePickSlot(ctx, turnIdx, cardIdx, slotKey, el) {
  if (pickerBusy) return;
  pickerBusy = true;
  pickerOpen = null; // the swap's success re-render won't reopen the dropdown
  if (el && el.classList) el.classList.add('picker-thinking');
  const fallback = (typeof document !== 'undefined') ? document.createElement('button') : {};
  try {
    if (ctx === 'today') await swapTodaySlot(slotKey, el || fallback);
    else await swapSlot(turnIdx, cardIdx, slotKey, el || fallback);
  } finally {
    // Always re-render: the swap functions skip their own re-render on failure,
    // which would otherwise leave the (state-closed) panel dangling on screen.
    pickerBusy = false;
    rerenderFor(ctx);
  }
}

function pickerPanelHtml(ctx, turnIdx, cardIdx, slotKey, currentId) {
  if (!pickerMatches(ctx, turnIdx, cardIdx, slotKey)) return '';
  const optional = (slotKey === 'outer' || slotKey === 'accessory');
  const args = `'${ctx}', ${turnIdx}, ${cardIdx}, '${slotKey}'`;
  const items = eligibleItemsForSlot(slotKey, pickerOpen.allSeasons);
  let rows = optional
    ? `<div class="picker-item${!currentId ? ' selected' : ''}" onclick="pickSlotItem(${args}, '')"><span>— none —</span>${!currentId ? '<span class="picker-check">✓</span>' : ''}</div>`
    : '';
  rows += items.map(w =>
    `<div class="picker-item${w.id === currentId ? ' selected' : ''}" onclick="pickSlotItem(${args}, '${esc(w.id)}')"><span>${esc(w.item)}</span>${w.id === currentId ? '<span class="picker-check">✓</span>' : ''}</div>`
  ).join('');
  if (!items.length && !optional) {

  }

// Save the (possibly self-styled) Today look as a FAVORITE — boosts these
// pieces in future recommendations without marking them worn (which would
// briefly hold them back). "Wear this" is the worn+picked path.
async function saveTodayLook() {
  const ds = dayState(); const o = ds.outfit;
  if (!o || ds.saved) return;
  const items = collectTodayItems();
  if (!items.length) return;
  const now = new Date().toISOString();
  savedOutfits.unshift({
    id: uid(), title: o.title, vibe: o.vibe, items: items.map(x => x.item),
    note: o.reason || null, savedAt: now, wore: false,
  });
  feedback.unshift({
    id: uid(), type: 'favorite', occasion: todayOccasionText(), season: '',
    items: items.map(x => ({ id: x.id, item: x.item })), timestamp: now,
  });
  ds.saved = true;
  insightsStale = true;
  await saveToServer();
  renderTodayHero();
  renderHistory();
}

async function swapTodaySlot(slotKey, btnEl) {
  const ds = dayState();
  const o = ds.outfit;
  if (!o) return;
  btnEl.disabled = true;
  btnEl.classList.add('swapping');

  const currentIds = {};
  SLOT_ORDER.forEach(k => { currentIds[k] = (o.slots[k] || {}).id || null; });
  const excluded = ds.excluded[slotKey] || [];
  const currentId = (o.slots[slotKey] || {}).id;
  if (currentId && !excluded.includes(currentId)) excluded.push(currentId);

  const abort = new AbortController();
  const timer = setTimeout(() => abort.abort(), 30000);
  try {
    const r = await apiFetch('/api/chat/swap', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: todayOccasionText(),
        slot: slotKey,
        current: currentIds,
        exclude: excluded,
      }),
      signal: abort.signal,
    });
    clearTimeout(timer);
    const data = await r.json();
    if (!r.ok || data.error) {
      alert(data.error || 'Swap failed — try again.');
      return;
    }
    o.slots[slotKey] = { id: data.id || null, reason: data.reason || '' };
    ds.excluded[slotKey] = excluded;
    renderTodayHero();
  } catch (e) {
    clearTimeout(timer);
    alert(e.name === 'AbortError' ? 'Swap took too long — try again.' : 'Connection error.');
  } finally {
    btnEl.disabled = false;
    btnEl.classList.remove('swapping');
  }
}

function collectTodayItems() {
  const o = dayState().outfit;
  if (!o) return [];
  return SLOT_ORDER.map(k => (o.slots[k] || {}).id)
    .filter(Boolean)
    .map(id => W.find(w => w.id === id))
    .filter(Boolean);
}

async function wearToday() {
  const ds = dayState();
  const o = ds.outfit;
  if (!o || ds.wore) return;
  const items = collectTodayItems();
  if (!items.length) return;
  const now = new Date().toISOString();
  savedOutfits.unshift({
    id: uid(),
    title: o.title,
    vibe: o.vibe,
    items: items.map(x => x.item),
    note: o.reason || null,
    savedAt: now,
    wore_at: now,
    wore: true,
  });
  feedback.unshift({
    id: uid(), type: 'picked',
    occasion: todayOccasionText(),
    season: '',
    items: items.map(x => ({ id: x.id, item: x.item })),
    timestamp: now,
  });
  ds.wore = true;
  insightsStale = true; // wear data changed — Insights refreshes on next open
  await saveToServer();
  renderTodayHero();
  renderHistory();
}

function anotherToday() {

// All plans are generated AND persisted server-side (POST /api/trip/plan writes
// into wardrobe.json's `trips` array). The client just lists + renders them —
// reopening a saved plan never re-calls Claude. Every dynamic string is esc()'d.
let trips = [];

async function loadTrips() {
  try {
    const r = await apiFetch('/api/trips');
    const data = await r.json();
    trips = (data && Array.isArray(data.trips)) ? data.trips : [];
  } catch (e) {
    trips = [];
  }
  renderTripBanner();

// Parse 'YYYY-MM-DD' as a LOCAL date (new Date(str) would shift via UTC).
function parseYMD(s) {
  if (!s || !/^\d{4}-\d{2}-\d{2}$/.test(s)) return null;
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function tripDateRange(t) {
  const s = parseYMD(t.start_date), e = parseYMD(t.end_date);
  if (!s || !e) return `${t.start_date || ''}–${t.end_date || ''}`;
  const sStr = s.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const sameMonth = s.getMonth() === e.getMonth() && s.getFullYear() === e.getFullYear();
  const eStr = sameMonth ? String(e.getDate()) : e.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return `${sStr}–${eStr}`;
}

// Most recent trip that hasn't ended yet (trips arrive newest-first).
function upcomingTrip() {
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
  return trips.find(t => (t.end_date || '') >= todayStr) || null;
}

function renderTripBanner() {

}

async function submitTripPlan() {
  const destination = document.getElementById('trip-dest').value.trim();
  const start_date = document.getElementById('trip-start').value;
  const end_date = document.getElementById('trip-end').value;
  const bag = getOpt('trip-bag-group') || 'carry-on';
  const notes = document.getElementById('trip-notes').value.trim();
  const errEl = document.getElementById('trip-form-error');

  // Client-side validation mirrors the server's rules.
  let err = null;
  if (!destination) err = 'Where to? Destination is required.';
  else if (!start_date || !end_date) err = 'Pick both travel dates.';
  else if (end_date < start_date) err = "Return date can't be before departure.";
  else {
    const s = parseYMD(start_date), e = parseYMD(end_date);
    if (s && e && (e - s) / 86400000 + 1 > 14) err = 'Trips up to 14 days — split longer ones.';
  }
  if (err) { errEl.textContent = err; return; }

  const box = document.getElementById('trip-modal-box');
  box.innerHTML = `
    <h2>Plan a trip</h2>
    <div class="trip-loading"><span class="ask-thinking">Reading the forecast, packing your bag</span></div>`;

  const abort = new AbortController();
  const timer = setTimeout(() => abort.abort(), 90000);
  try {
    const r = await apiFetch('/api/trip/plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ destination, start_date, end_date, bag, notes }),
      signal: abort.signal,
    });
    clearTimeout(timer);
    const data = await r.json();
    if (!r.ok || data.error || data.ok === false) {
      throw new Error(data.error || 'Could not plan the trip — try again.');
    }
    trips.unshift(data);   // already persisted server-side
    renderTripBanner();
    renderTripResult(data);
  } catch (e) {
    clearTimeout(timer);
    const msg = e.name === 'AbortError'
      ? 'Took too long — try again.'
      : (e.message || 'Connection error — is the server running?');
    renderTripForm({ destination, start_date, end_date, bag, notes, error: msg });
  }
}

async function loadInsights() {

    }
  } finally {
    insightsLoading = false;

// Relative date for wear timestamps — "today", "3d ago", "3w ago", "2mo ago".
function relTime(iso) {
  if (!iso) return '';
  const then = new Date(iso);
  if (isNaN(then)) return '';
  const days = Math.floor((Date.now() - then.getTime()) / 86400000);
  if (days <= 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 14) return `${days}d ago`;
  if (days < 61) return `${Math.round(days / 7)}w ago`;
  if (days < 365) return `${Math.round(days / 30)}mo ago`;
  return `${Math.floor(days / 365)}y ago`;
}

  const cats = d.categories || {};

  const categoriesHtml = catNames.length ? `

// ── Theme ───────────────────────────────────────────────────────────────────
// Keep the browser/PWA chrome color in sync with the app's manual theme toggle.
// Both metas get the same value so it wins regardless of the OS color scheme.
function applyThemeColor(theme) {
  const color = theme === 'dark' ? '#18181b' : '#fafaf8';
  document.querySelectorAll('meta[name="theme-color"]').forEach(m => m.setAttribute('content', color));
}
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀' : '☾';
  applyThemeColor(next);
}
(function initTheme() {
  const saved = localStorage.getItem('theme');
  const prefer = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  const theme = saved || prefer;
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-toggle').textContent = '☀';
  }
  applyThemeColor(theme);
})();

// ── Service worker (Drop 4: PWA) ────────────────────────────────────────────
// Feature-detected and non-blocking; failures are silent — the app works
// identically without a SW, it just isn't installable/offline-capable.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {}); // relative: works at '/' locally and under the cloud storage path
  });
}

// Expose state for E2E tests — harmless in production, cheap for Playwright.
window.W = W;
window.savedOutfits = savedOutfits;
window.feedback = feedback;
window.settings = settings;
window.setChatThread = (turns) => {
  chatThread = turns || [];
  cardState = {};
};
window.getChatThread = () => chatThread;
window.renderHistory = renderHistory;
window.renderThread = renderThread;
window.getTodayState = () => todayState;

// ── Init ────────────────────────────────────────────────────────────────────
// Cloud mode boots only after sign-in (the gate calls bootApp on success);
// local mode boots immediately, with the cloud session restored quietly for
// the Settings migration affordances.
async function bootApp() {
  await load();
  window.W = W;
  window.savedOutfits = savedOutfits;
  window.feedback = feedback;
  window.settings = settings;
  initToday();
}
(async () => {
  const signedIn = await initCloud();
  if (IS_CLOUD && !signedIn) { showAuthGate('gate'); return; }
  bootApp();
})();
</script>
</body>
</html>
